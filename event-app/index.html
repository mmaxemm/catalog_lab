<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Гиндеров Максим 3к. 2гр. 2026</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fafafa; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #f0f0f0; cursor: pointer; user-select: none; }
        th:hover { background: #e0e0e0; }
        .hidden { display: none; }
        .modal { position: fixed; top: 15%; left: 30%; width: 40%; background: white; padding: 25px; border: 2px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; }
        input, select, textarea { width: 100%; margin-bottom: 12px; padding: 6px; box-sizing: border-box; }
        textarea { height: 80px; resize: vertical; }
        button { padding: 6px 15px; margin-right: 5px; cursor: pointer; }
        label { font-weight: bold; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <h1>Гиндеров Максим 3к. 2гр. 2026</h1>
    
    <label for="dictSelect">Выберите справочник:</label>
    <select id="dictSelect" onchange="switchDict()" style="width: auto; display: inline-block; margin-right: 20px;">
        <option value="places">Места (Place)</option>
        <option value="events">События (Event)</option>
    </select>
    <button onclick="openModal()" style="background: #4CAF50; color: white; border: none; padding: 8px 16px;">+ Добавить запись</button>

    <div id="placesView">
        <table id="placesTable">
            <thead>
                <tr>
                    <th onclick="sortTable('placesTable', 0, 'number')">ID ↕</th>
                    <th onclick="sortTable('placesTable', 1, 'string')">Название ↕</th>
                    <th onclick="sortTable('placesTable', 2, 'number')">Вместимость ↕</th>
                    <th onclick="sortTable('placesTable', 3, 'string')">Адрес ↕</th>
                    <th onclick="sortTable('placesTable', 4, 'date')">Дата открытия ↕</th>
                    <th onclick="sortTable('placesTable', 5, 'number')">Площадь (кв.м) ↕</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="eventsView" class="hidden">
        <table id="eventsTable">
            <thead>
                <tr>
                    <th onclick="sortTable('eventsTable', 0, 'number')">ID ↕</th>
                    <th onclick="sortTable('eventsTable', 1, 'string')">Название ↕</th>
                    <th onclick="sortTable('eventsTable', 2, 'string')">Описание ↕</th>
                    <th onclick="sortTable('eventsTable', 3, 'datetime')">Начало ↕</th>
                    <th onclick="sortTable('eventsTable', 4, 'datetime')">Конец ↕</th>
                    <th onclick="sortTable('eventsTable', 5, 'number')">Цена ↕</th>
                    <th onclick="sortTable('eventsTable', 6, 'number')">Возрастной лимит ↕</th>
                    <th onclick="sortTable('eventsTable', 7, 'string')">Место проведения ↕</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="placeModal" class="modal hidden">
        <h3 id="placeModalTitle">Добавить Место</h3>
        <input type="hidden" id="place_id">
        <label>Название:</label>
        <input type="text" id="place_name" required>
        <label>Вместимость (> 0):</label>
        <input type="number" id="place_capacity" min="1" required>
        <label>Адрес:</label>
        <textarea id="place_address"></textarea>
        <label>Дата открытия:</label>
        <input type="date" id="place_opening_date" required>
        <label>Площадь (> 0):</label>
        <input type="number" step="0.01" id="place_area" min="0.01" required>
        <button onclick="savePlace()" style="background: #2196F3; color: white; border:none;">Сохранить</button>
        <button onclick="closeModals()">Отмена</button>
    </div>

    <div id="eventModal" class="modal hidden">
        <h3 id="eventModalTitle">Добавить Событие</h3>
        <input type="hidden" id="event_id">
        <label>Название события:</label>
        <input type="text" id="event_name" required>
        <label>Описание:</label>
        <textarea id="event_description"></textarea>
        <label>Время начала:</label>
        <input type="datetime-local" id="event_start" required>
        <label>Время окончания:</label>
        <input type="datetime-local" id="event_end" required>
        <label>Цена билета (>= 0):</label>
        <input type="number" step="0.01" id="event_price" min="0" value="0" required>
        <label>Возрастной лимит (>= 0):</label>
        <input type="number" id="event_age" min="0" value="0" required> 
        <label>Место:</label>
        <select id="event_place_id" required></select>
        <button onclick="saveEvent()" style="background: #2196F3; color: white; border:none;">Сохранить</button>
        <button onclick="closeModals()">Отмена</button>
    </div>

<script>
    let currentDict = 'places';
    let sortDirection = true;

    const formatDate = (isoStr) => {
        if(!isoStr) return "";
        const [y, m, d] = isoStr.split('-');
        return `${d}.${m}.${y}`;
    };
    const formatDateTime = (isoStr) => {
        if(!isoStr) return "";
        const [datePart, timePart] = isoStr.split('T');
        return `${formatDate(datePart)} ${timePart}`;
    };

    function switchDict() {
        currentDict = document.getElementById('dictSelect').value;
        document.getElementById('placesView').className = currentDict === 'places' ? '' : 'hidden';
        document.getElementById('eventsView').className = currentDict === 'events' ? '' : 'hidden';
        loadData();
    }

    async function handleResponse(res) {
        if (!res.ok) {
            // Теперь сервер присылает простую строку "Неправильно введены данные"
            const text = await res.text();
            alert(text.trim() || "Неправильно введены данные");
            return false;
        }
        return true;
    }

    async function loadData() {
        if (currentDict === 'places') {
            const res = await fetch('/api/places');
            const data = await res.json() || [];
            const tbody = document.querySelector('#placesTable tbody');
            tbody.innerHTML = '';
            data.forEach(p => {
                tbody.innerHTML += `<tr>
                    <td>${p.id}</td><td>${p.name}</td><td>${p.capacity}</td><td>${p.address}</td>
                    <td data-raw="${p.opening_date}">${formatDate(p.opening_date)}</td><td>${p.area}</td>
                    <td>
                        <button onclick='editPlace(${JSON.stringify(p)})'>Ред.</button>
                        <button onclick='deleteRecord("places", ${p.id})'>Удалить</button>
                    </td>
                </tr>`;
            });
        } else {
            const res = await fetch('/api/events');
            const data = await res.json() || [];
            const tbody = document.querySelector('#eventsTable tbody');
            tbody.innerHTML = '';
            data.forEach(e => {
                tbody.innerHTML += `<tr>
                    <td>${e.id}</td><td>${e.name}</td><td>${e.description}</td>
                    <td data-raw="${e.start_time}">${formatDateTime(e.start_time)}</td>
                    <td data-raw="${e.end_time}">${formatDateTime(e.end_time)}</td>
                    <td>${e.price}</td><td>${e.age_limit}+</td><td data-val="${e.place_id}">${e.place_name}</td>
                    <td>
                        <button onclick='editEvent(${JSON.stringify(e)})'>Ред.</button>
                        <button onclick='deleteRecord("events", ${e.id})'>Удалить</button>
                    </td>
                </tr>`;
            });
        }
    }

    async function openModal() {
        if (currentDict === 'places') {
            document.getElementById('place_id').value = '';
            document.getElementById('place_name').value = '';
            document.getElementById('place_capacity').value = '';
            document.getElementById('place_address').value = '';
            document.getElementById('place_opening_date').value = '';
            document.getElementById('place_area').value = '';
            document.getElementById('placeModalTitle').innerText = 'Добавить Место';
            document.getElementById('placeModal').classList.remove('hidden');
        } else {
            const res = await fetch('/api/places');
            const places = await res.json() || [];
            const select = document.getElementById('event_place_id');
            select.innerHTML = '';
            
            if(places.length === 0) {
                alert("Сначала добавьте хотя бы одно Место проведения!");
                return;
            }
            
            places.forEach(p => {
                select.innerHTML += `<option value="${p.id}">${p.name} (ID: ${p.id})</option>`;
            });
            
            document.getElementById('event_id').value = '';
            document.getElementById('event_name').value = '';
            document.getElementById('event_description').value = '';
            document.getElementById('event_start').value = '';
            document.getElementById('event_end').value = '';
            document.getElementById('event_price').value = '0';
            document.getElementById('event_age').value = '0';
            document.getElementById('eventModalTitle').innerText = 'Добавить Событие';
            document.getElementById('eventModal').classList.remove('hidden');
        }
    }

    function closeModals() {
        document.getElementById('placeModal').classList.add('hidden');
        document.getElementById('eventModal').classList.add('hidden');
    }

    function editPlace(p) {
        openModal();
        document.getElementById('placeModalTitle').innerText = 'Редактировать Место';
        document.getElementById('place_id').value = p.id;
        document.getElementById('place_name').value = p.name;
        document.getElementById('place_capacity').value = p.capacity;
        document.getElementById('place_address').value = p.address;
        document.getElementById('place_opening_date').value = p.opening_date;
        document.getElementById('place_area').value = p.area;
    }

    async function editEvent(e) {
        await openModal();
        document.getElementById('eventModalTitle').innerText = 'Редактировать Событие';
        document.getElementById('event_id').value = e.id;
        document.getElementById('event_name').value = e.name;
        document.getElementById('event_description').value = e.description;
        document.getElementById('event_start').value = e.start_time;
        document.getElementById('event_end').value = e.end_time;
        document.getElementById('event_price').value = e.price;
        document.getElementById('event_age').value = e.age_limit;
        document.getElementById('event_place_id').value = e.place_id;
    }

    async function savePlace() {
        const id = document.getElementById('place_id').value;
        const data = {
            name: document.getElementById('place_name').value,
            capacity: parseInt(document.getElementById('place_capacity').value) || 0,
            address: document.getElementById('place_address').value,
            opening_date: document.getElementById('place_opening_date').value,
            area: parseFloat(document.getElementById('place_area').value) || 0
        };
        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/places/${id}` : '/api/places';
        
        const res = await fetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        if (await handleResponse(res)) { closeModals(); loadData(); }
    }

    async function saveEvent() {
        const startVal = document.getElementById('event_start').value;
        const endVal = document.getElementById('event_end').value;

        // Предварительная проверка дат прямо в браузере
        if (startVal && endVal) {
            const start = new Date(startVal);
            const end = new Date(endVal);
            if (start > end) {
                alert("Неправильно введены данные: время начала не может быть позже времени конца!");
                return;
            }
        }

        const id = document.getElementById('event_id').value;
        const data = {
            name: document.getElementById('event_name').value,
            description: document.getElementById('event_description').value,
            start_time: startVal,
            end_time: endVal,
            price: parseFloat(document.getElementById('event_price').value) || 0,
            age_limit: parseInt(document.getElementById('event_age').value) || 0,
            place_id: parseInt(document.getElementById('event_place_id').value)
        };
        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/events/${id}` : '/api/events';
        
        const res = await fetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        if (await handleResponse(res)) { closeModals(); loadData(); }
    }

    async function deleteRecord(dict, id) {
        if(confirm('Применить мягкое удаление к этой записи?')) {
            const res = await fetch(`/api/${dict}/${id}`, { method: 'DELETE' });
            if (await handleResponse(res)) { loadData(); }
        }
    }

    function sortTable(tableId, colIndex, type) {
        const table = document.getElementById(tableId);
        const tbody = table.tBodies[0];
        const rows = Array.from(tbody.querySelectorAll("tr"));
        
        rows.sort((a, b) => {
            let valA = a.cells[colIndex].getAttribute('data-raw') || a.cells[colIndex].innerText;
            let valB = b.cells[colIndex].getAttribute('data-raw') || b.cells[colIndex].innerText;
            
            if (type === 'number') {
                return sortDirection ? parseFloat(valA) - parseFloat(valB) : parseFloat(valB) - parseFloat(valA);
            } else {
                return sortDirection ? valA.localeCompare(valB) : valB.localeCompare(valA);
            }
        });
        
        sortDirection = !sortDirection;
        tbody.append(...rows);
    }

    window.onload = loadData;
</script>
</body>
</html>
